<!-- 简历上传弹窗 Modal — 点击按钮后显示 -->
<div id="resumeModalOverlay" class="resume-modal-overlay" style="display:none;">
    <div class="resume-modal" id="resumeModal">
        <div class="resume-modal-header">
            <h5><i class="bi bi-file-earmark-arrow-up"></i> 投递简历</h5>
            <button class="btn-close-modal" id="closeResumeModal">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <div class="resume-modal-body">
            <p style="font-size: 0.82rem; color: var(--color-text-secondary); margin-bottom: 16px;">
                对职位感兴趣？留下您的信息，我们将尽快与您联系。
            </p>
            <form id="modalResumeForm" enctype="multipart/form-data">
                <div class="row g-2">
                    <div class="col-12 mb-2">
                        <label class="form-label">姓名 <span style="color:var(--color-accent)">*</span></label>
                        <input type="text" class="form-control" name="name" required placeholder="您的姓名">
                    </div>
                    <div class="col-md-6 mb-2">
                        <label class="form-label">电子邮箱</label>
                        <input type="email" class="form-control" name="email" placeholder="name@company.com">
                    </div>
                    <div class="col-md-6 mb-2">
                        <label class="form-label">手机号码</label>
                        <input type="tel" class="form-control" name="phone" placeholder="手机号">
                    </div>
                    <div class="col-12 mb-2">
                        <label class="form-label">意向职位</label>
                        <input type="text" class="form-control" name="position" placeholder="如：软件工程师">
                    </div>
                    <div class="col-12 mb-3">
                        <label class="form-label">简历文件 <span style="color:var(--color-accent)">*</span></label>
                        <input type="file" class="form-control" name="resume_file" required
                               accept=".pdf,.doc,.docx,.txt">
                        <div style="font-size: 0.72rem; color: var(--color-text-secondary); margin-top: 4px;">
                            支持 PDF、Word、TXT 格式，最大 16MB
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="modalSubmitBtn">
                    <i class="bi bi-send"></i> 提交简历
                </button>
            </form>
            <div id="modalResult" class="mt-3" style="display:none;"></div>
        </div>
    </div>
</div>
